<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="app.css">
</head>

<body>

<div id="reset-page"
     style="min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px">

  <div class="card auth-box">

    <h2 class="auth-head-title">Reset Password</h2>

    <!-- EMAIL STEP -->
    <div id="email-step">

      <p class="auth-head-sub">
        Enter your email to receive reset link
      </p>

      <input
        type="email"
        id="reset-email"
        class="finput"
        placeholder="Enter your email"
      >

      <button
        class="btn btn-primary"
        id="send-link-btn"
      >
        Send Reset Link
      </button>

    </div>

    <!-- PASSWORD STEP -->
    <div id="password-step" style="display:none">

  <p class="auth-head-sub">
    Enter OTP and new password
  </p>

  <input
    type="text"
    id="otp-input"
    class="finput"
    placeholder="Enter OTP"
  >

  <input
    type="password"
    id="new-pass"
    class="finput"
    placeholder="New Password"
  >

  <input
    type="password"
    id="confirm-pass"
    class="finput"
    placeholder="Confirm Password"
  >

  <button
    class="btn btn-primary"
    id="reset-pass-btn"
  >
    Update Password
  </button>

</div>

    <!-- BACK -->
    <div style="margin-top:15px;text-align:center">

      <a href="index.html" style="color:#7c5cfc">
        Back to Login
      </a>

    </div>

  </div>
</div>

<script>

// =====================================
// TOKEN CHECK
// =====================================

const params = new URLSearchParams(window.location.search);

const token = params.get("token");

// token present → show password form
if (token) {

  document.getElementById("email-step").style.display = "none";

  document.getElementById("password-step").style.display = "block";
}

// =====================================
// SEND RESET LINK
// =====================================

document.getElementById("send-link-btn").onclick = async () => {

  const email =
    document.getElementById("reset-email")
    .value
    .trim();

  if (!email) {

    alert("Please enter email");

    return;
  }

  try {

    const res = await fetch(
      "http://127.0.0.1:8000/auth/forgot-password",
      {
        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({
          email
        })
      }
    );

    const data = await res.json();

    console.log("FORGOT RESPONSE:", data);

    if (!res.ok) {

      alert(
        data.detail ||
        data.message ||
        "Failed to send reset link"
      );

      return;
    }

    alert("Reset link sent to your email 📩");
    document.getElementById(
  "email-step"
).style.display = "none";

document.getElementById(
  "password-step"
).style.display = "block";

  } catch (err) {

    console.error(err);

    alert("Server error ❌");
  }
};

// =====================================
// RESET PASSWORD
// =====================================

document.getElementById("reset-pass-btn").onclick = async () => {

  const otp =
  document.getElementById(
    "otp-input"
  ).value.trim();
  if (!otp) {

  alert("Please enter OTP");

  return;
}
  const pass =
    document.getElementById("new-pass").value;

  const confirm =
    document.getElementById("confirm-pass").value;

  if (!pass || !confirm) {

    alert("Please fill all fields");

    return;
  }

  if (pass !== confirm) {

    alert("Passwords do not match");

    return;
  }

  try {

    const res = await fetch(
      "http://127.0.0.1:8000/auth/reset-password",
      {
        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({

  email:
    document.getElementById(
      "reset-email"
    ).value.trim(),

  otp: otp,

  new_password: pass
})
      }
    );

    const data = await res.json();

    console.log("RESET RESPONSE:", data);

    if (!res.ok) {

      alert(
        data.detail ||
        data.message ||
        "Reset failed"
      );

      return;
    }

    alert("Password updated successfully ✅");

    window.location.href = "index.html";

  } catch (err) {

    console.error(err);

    alert("Something went wrong ❌");
  }
};

</script>

</body>
</html>
